<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090b">
    <title>plgame</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="h-full overflow-hidden bg-zinc-950 font-sans text-sm text-zinc-200 antialiased selection:bg-violet-400/30">
    <main
        id="workspace"
        class="group/workspace grid h-dvh min-h-0 grid-cols-1 grid-rows-[2.5rem_2.25rem_minmax(0,1fr)] overflow-hidden bg-zinc-950 md:grid-cols-[minmax(0,1fr)_0.375rem_minmax(18rem,var(--task-rail-width))] md:grid-rows-1"
        data-mobile-tab="code"
    >
        <section
            id="code-panel"
            class="row-start-3 hidden min-h-0 min-w-0 flex-col gap-1.5 overflow-hidden p-2 max-md:group-data-[browsing=true]/workspace:!hidden group-data-[mobile-tab=code]/workspace:flex md:col-start-1 md:row-start-1 md:flex md:p-2.5 [&_.cm-activeLine]:!bg-zinc-800/70 [&_.cm-activeLineGutter]:!bg-zinc-800/70 [&_.cm-content]:caret-violet-300 [&_.cm-editor]:h-full [&_.cm-editor]:!bg-zinc-950 [&_.cm-editor]:font-mono [&_.cm-editor]:!text-zinc-200 [&_.cm-editor]:[color-scheme:dark] [&_.cm-editor.cm-focused]:outline-none [&_.cm-gutter]:!bg-zinc-900 [&_.cm-gutters]:!border-r [&_.cm-gutters]:!border-zinc-800 [&_.cm-gutters]:!bg-zinc-900 [&_.cm-gutters]:!text-zinc-600 [&_.cm-scroller]:font-mono [&_.cm-scroller]:[color-scheme:dark] [&_.cm-scroller]:[scrollbar-color:#52525b_#18181b]"
            role="tabpanel"
            aria-labelledby="code-tab"
        >
            <div id="code-version-toolbar" class="flex h-8 shrink-0 gap-1">
                <div class="relative min-w-0 flex-1">
                    <select
                        id="code-version"
                        class="h-full w-full appearance-none rounded border border-zinc-700 bg-zinc-900 py-0 pr-8 pl-2 text-xs text-zinc-200 outline-none hover:border-zinc-600 focus:border-violet-400 focus:ring-1 focus:ring-violet-400"
                        aria-label="Code version"
                    ></select>
                    <i
                        class="pointer-events-none absolute top-1/2 right-2 size-3.5 -translate-y-1/2 text-zinc-500"
                        data-lucide="chevron-down"
                        aria-hidden="true"
                    ></i>
                </div>
                <button
                    id="add-code-version"
                    class="grid size-8 place-items-center rounded border border-zinc-700 bg-zinc-900 text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800 hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-400 disabled:cursor-not-allowed disabled:opacity-40 [&_.lucide]:size-4"
                    type="button"
                    aria-label="Create code version"
                >
                    <i data-lucide="plus"></i>
                </button>
                <button
                    id="rename-code-version"
                    class="h-8 rounded border border-zinc-700 bg-zinc-900 px-2 text-xs text-zinc-300 hover:border-zinc-500 hover:bg-zinc-800 hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-400 disabled:cursor-not-allowed disabled:opacity-40"
                    type="button"
                >Rename</button>
                <button
                    id="delete-code-version"
                    class="h-8 rounded border border-zinc-700 bg-zinc-900 px-2 text-xs text-zinc-400 hover:border-red-500/60 hover:bg-red-500/10 hover:text-red-300 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-400 disabled:cursor-not-allowed disabled:opacity-40"
                    type="button"
                >Delete</button>
            </div>
            <div id="editor" class="min-h-0 flex-1 overflow-hidden rounded border border-zinc-800 bg-zinc-950"></div>
        </section>

        <div
            id="workspace-divider"
            class="hidden cursor-col-resize touch-none border-l border-zinc-800 bg-zinc-900 hover:bg-violet-500/40 focus:bg-violet-500/40 focus:outline-none md:col-start-2 md:row-start-1 md:block"
            role="separator"
            aria-label="Resize code editor and task panel"
            aria-orientation="vertical"
            aria-valuemin="288"
            tabindex="0"
        ></div>

        <aside
            id="task-rail"
            class="contents min-h-0 min-w-0 border-zinc-800 group-data-[browsing=true]/workspace:[&>#challenge-panel]:!hidden group-data-[browsing=true]/workspace:[&>#results-panel]:!hidden md:col-start-3 md:row-start-1 md:flex md:flex-col md:overflow-y-auto md:border-l"
            aria-label="Current level"
        >
            <header
                id="level-header"
                class="col-start-1 row-start-1 grid h-10 grid-cols-[2rem_minmax(0,1fr)_2rem_2rem_auto] items-center gap-1 border-b border-zinc-800 bg-zinc-950 px-1.5 md:sticky md:top-0 md:z-10 md:shrink-0 [&>button]:grid [&>button]:h-8 [&>button]:place-items-center [&>button]:rounded [&>button]:border [&>button]:border-zinc-700 [&>button]:bg-zinc-900 [&>button]:text-xs [&>button]:text-zinc-300 [&>button]:hover:border-zinc-500 [&>button]:hover:bg-zinc-800 [&>button]:hover:text-white [&>button]:focus-visible:outline-2 [&>button]:focus-visible:outline-offset-2 [&>button]:focus-visible:outline-violet-400 [&>button]:disabled:cursor-not-allowed [&>button]:disabled:opacity-35 [&_.lucide]:size-4"
            >
                <button
                    id="previous-level"
                    type="button"
                    aria-label="Previous level"
                >
                    <i data-lucide="arrow-left"></i>
                </button>
                <button
                    id="level-number"
                    class="!flex min-w-0 items-center justify-center gap-1 px-2 font-semibold aria-expanded:[&_.lucide]:rotate-180 data-[level-state=failed]:[&>#level-number-label]:!text-red-300 data-[level-state=passed]:[&>#level-number-label]:!text-emerald-300 [&_.lucide]:shrink-0"
                    type="button"
                    aria-label="Browse unlocked levels"
                    aria-controls="level-navigation"
                    aria-expanded="false"
                >
                    <span id="level-number-label" class="truncate"></span>
                    <i data-lucide="chevron-down"></i>
                </button>
                <button
                    id="next-level"
                    type="button"
                    aria-label="Next unlocked level"
                >
                    <i data-lucide="arrow-right"></i>
                </button>
                <button
                    id="latest-level"
                    type="button"
                    aria-label="Go to latest unlocked level"
                    title="Go to latest unlocked level"
                >
                    <i data-lucide="arrow-right-to-line"></i>
                </button>
                <button
                    id="run"
                    class="!border-violet-400 !bg-violet-400 px-3 !font-semibold !text-zinc-950 hover:!border-violet-300 hover:!bg-violet-300"
                    type="button"
                    title="Run (Ctrl+Enter or Command+Enter)"
                >Run</button>
            </header>

            <nav
                id="mobile-tabs"
                class="col-start-1 row-start-2 grid grid-cols-3 border-b border-zinc-800 bg-zinc-950 group-data-[browsing=true]/workspace:!hidden md:hidden [&_button]:border-r [&_button]:border-zinc-800 [&_button]:text-xs [&_button]:text-zinc-500 [&_button]:hover:bg-zinc-900 [&_button]:hover:text-zinc-200 [&_button]:focus-visible:outline-2 [&_button]:focus-visible:-outline-offset-2 [&_button]:focus-visible:outline-violet-400 [&_button:last-child]:border-r-0 [&_button[aria-selected=true]]:bg-zinc-900 [&_button[aria-selected=true]]:font-semibold [&_button[aria-selected=true]]:text-violet-300"
                role="tablist"
                aria-label="Game workspace"
            >
                <button
                    id="challenge-tab"
                    type="button"
                    role="tab"
                    aria-controls="challenge-panel"
                    aria-selected="false"
                    tabindex="-1"
                    data-tab="challenge"
                >Challenge</button>
                <button
                    id="code-tab"
                    type="button"
                    role="tab"
                    aria-controls="code-panel"
                    aria-selected="true"
                    data-tab="code"
                >Code</button>
                <button
                    id="results-tab"
                    type="button"
                    role="tab"
                    aria-controls="results-panel"
                    aria-selected="false"
                    tabindex="-1"
                    data-tab="results"
                >
                    Failures
                    <span
                        id="failures-tab-count"
                        class="ml-1 inline-flex min-w-4 items-center justify-center rounded-full bg-red-500/20 px-1 text-[0.625rem] font-semibold leading-4 text-red-300"
                        aria-hidden="true"
                        hidden
                    ></span>
                </button>
            </nav>

            <section
                id="challenge-panel"
                class="col-start-1 row-start-3 hidden min-h-0 overflow-y-auto border-zinc-800 p-2.5 group-data-[mobile-tab=challenge]/workspace:block md:block md:shrink-0 md:border-b md:p-3"
                role="tabpanel"
                aria-labelledby="challenge-tab"
            >
                <div class="mb-2 flex items-center justify-between">
                    <h2 class="text-[0.6875rem] font-bold uppercase tracking-[0.16em] text-zinc-500">Challenge</h2>
                    <button
                        id="refresh-previews"
                        class="h-7 rounded border border-zinc-700 bg-zinc-900 px-2 text-[0.6875rem] text-zinc-400 hover:border-zinc-500 hover:bg-zinc-800 hover:text-zinc-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-400 disabled:cursor-not-allowed disabled:opacity-40"
                        type="button"
                    >Refresh</button>
                </div>
                <div class="mb-1 flex items-center gap-2">
                    <h3 class="text-xs font-semibold text-zinc-200">Input</h3>
                    <span
                        class="inline-flex items-center gap-1 text-[0.625rem] text-zinc-600 [&_.lucide]:size-3"
                        title="This preview is rendered using your code's render() function."
                    >
                        <i data-lucide="info"></i>
                        <span>via <code class="text-zinc-500">render()</code></span>
                    </span>
                </div>
                <pre class="mb-3 min-h-8 whitespace-pre-wrap break-words rounded border border-zinc-800 bg-zinc-900/60 p-2 font-mono text-xs leading-relaxed text-zinc-300"><code id="level-input"></code></pre>
                <div class="mb-1 flex items-center gap-2">
                    <h3 class="text-xs font-semibold text-zinc-200">Expected output</h3>
                    <span
                        class="inline-flex items-center gap-1 text-[0.625rem] text-zinc-600 [&_.lucide]:size-3"
                        title="This preview is rendered using your code's render() function."
                    >
                        <i data-lucide="info"></i>
                        <span>via <code class="text-zinc-500">render()</code></span>
                    </span>
                </div>
                <pre class="mb-3 min-h-8 whitespace-pre-wrap break-words rounded border border-zinc-800 bg-zinc-900/60 p-2 font-mono text-xs leading-relaxed text-zinc-300"><code id="level-output"></code></pre>
                <div
                    id="challenge-result"
                    class="text-xs leading-relaxed text-zinc-400 [&_.diff-line]:font-mono [&_.diff-line-actual]:text-red-400 [&_.diff-line-expected]:text-emerald-400 [&_del]:bg-emerald-400/15 [&_del]:text-emerald-300 [&_del]:no-underline [&_ins]:bg-red-400/15 [&_ins]:text-red-300 [&_ins]:no-underline [&_p]:my-2 [&_pre]:my-1 [&_pre]:min-h-8 [&_pre]:whitespace-pre-wrap [&_pre]:break-words [&_pre]:rounded [&_pre]:border [&_pre]:border-zinc-800 [&_pre]:bg-zinc-900/60 [&_pre]:p-2 [&_strong]:text-zinc-100"
                    role="status"
                    aria-live="polite"
                    aria-atomic="true"
                ></div>
            </section>

            <section
                id="results-panel"
                class="col-start-1 row-start-3 hidden min-h-0 overflow-y-auto p-2.5 group-data-[mobile-tab=results]/workspace:block md:block md:flex-1 md:p-3"
                role="tabpanel"
                aria-labelledby="results-tab"
            >
                <h2 class="mb-2 flex items-center gap-1.5 text-[0.6875rem] font-bold uppercase tracking-[0.16em] text-zinc-500">
                    Failures
                    <span
                        id="failures-panel-count"
                        class="inline-flex min-w-4 items-center justify-center rounded-full bg-red-500/20 px-1 text-[0.625rem] font-semibold leading-4 tracking-normal text-red-300"
                        aria-hidden="true"
                        hidden
                    ></span>
                </h2>
                <div
                    id="status"
                    class="text-xs leading-relaxed text-zinc-400 [&_button]:block [&_button]:w-full [&_button]:rounded [&_button]:border [&_button]:border-red-500/40 [&_button]:bg-red-500/10 [&_button]:p-2 [&_button]:text-left [&_button]:font-medium [&_button]:text-red-300 [&_button]:hover:border-red-400/60 [&_button]:hover:bg-red-500/15 [&_button]:hover:text-red-200 [&_button]:focus-visible:outline-2 [&_button]:focus-visible:outline-offset-2 [&_button]:focus-visible:outline-red-400 [&_button:disabled]:cursor-default [&_button:disabled]:opacity-60 [&_li+li]:mt-1.5"
                    role="status"
                    aria-live="polite"
                    aria-atomic="true"
                >
                    <div id="result-content">Run your code to see failed levels.</div>
                </div>
            </section>

            <nav
                id="level-navigation"
                class="col-start-1 row-[2/4] min-h-0 overflow-y-auto bg-zinc-950 p-2.5 md:flex-1 md:p-3"
                aria-label="Unlocked levels"
                hidden
            >
                <h2 class="mb-2 text-[0.6875rem] font-bold uppercase tracking-[0.16em] text-zinc-500">Unlocked levels</h2>
                <div
                    id="level-grid"
                    class="grid grid-cols-[repeat(auto-fill,minmax(6.5rem,1fr))] gap-1.5 [&_button]:grid [&_button]:gap-0.5 [&_button]:rounded [&_button]:border [&_button]:border-zinc-800 [&_button]:bg-zinc-900/60 [&_button]:p-2 [&_button]:text-left [&_button]:text-zinc-300 [&_button]:hover:border-zinc-600 [&_button]:hover:bg-zinc-800 [&_button]:focus-visible:outline-2 [&_button]:focus-visible:outline-offset-2 [&_button]:focus-visible:outline-violet-400 [&_button[aria-current=step]]:border-violet-400 [&_button[aria-current=step]]:ring-1 [&_button[aria-current=step]]:ring-violet-400 [&_button[data-level-state=failed]]:border-red-500/40 [&_button[data-level-state=failed]]:bg-red-500/10 [&_button[data-level-state=failed]]:text-red-300 [&_button[data-level-state=passed]]:border-emerald-500/30 [&_button[data-level-state=passed]]:bg-emerald-500/10 [&_button[data-level-state=passed]]:text-emerald-300 [&_small]:text-[0.625rem] [&_small]:font-normal [&_small]:text-zinc-600"
                ></div>
            </nav>
        </aside>
    </main>
    <script type="module" src="./game.ts"></script>
</body>
</html>

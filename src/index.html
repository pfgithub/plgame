<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plgame</title>
    <style>
        html, body, main, section, #editor {
            height: 100%;
        }

        body {
            margin: 0;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        section {
            box-sizing: border-box;
            min-width: 0;
            padding: 1rem;
        }

        section + section {
            border-left: 1px solid;
        }

        .tokens {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            min-height: 1.5rem;
        }

        .token-name {
            width: 8rem;
        }

        #level-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .cm-editor {
            height: 100%;
        }
    </style>
</head>
<body>
    <main>
        <section aria-label="Code editor">
            <div id="editor"></div>
        </section>
        <section aria-label="Current level">
            <nav aria-label="Level navigation">
                <button id="previous-level" type="button">Back</button>
                <button id="show-levels" type="button">All levels</button>
                <button id="next-level" type="button">Forward</button>
            </nav>
            <div id="failed-levels"></div>
            <div id="level-detail">
                <h1 id="level-number"></h1>
                <h2>Input</h2>
                <div id="level-input" class="tokens"></div>
                <h2>Expected output</h2>
                <div id="level-output" class="tokens"></div>
                <p><button id="run" type="button">Run</button></p>
                <p id="status" role="status" aria-live="polite"></p>
            </div>
            <div id="level-picker" hidden>
                <h1>Levels</h1>
                <div id="level-grid"></div>
            </div>
        </section>
    </main>
    <script type="module" src="./game.ts"></script>
</body>
</html>
